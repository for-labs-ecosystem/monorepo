# Worker name follows the forlabs- prefix convention
name = "forlabs-api-worker"
main = "src/index.ts"
compatibility_date = "2025-02-20"
compatibility_flags = ["nodejs_compat"]

# D1 Database binding — ID will be filled after `wrangler d1 create`
[[d1_databases]]
binding = "DB"
database_name = "forlabs-cms-db"
database_id = "affd3b85-8f03-4f40-b1c9-a6749235daf0"
migrations_dir = "../../packages/db/src/migrations"

# R2 Bucket binding
[[r2_buckets]]
binding = "MEDIA"
bucket_name = "forlabs-media-bucket"

# ─── Secrets (set via `wrangler secret put`) ───
#   wrangler secret put GOOGLE_CLIENT_ID
#   wrangler secret put GOOGLE_CLIENT_SECRET
#   wrangler secret put JWT_SECRET
#   wrangler secret put RESEND_API_KEY
#   wrangler secret put IYZICO_API_KEY
#   wrangler secret put IYZICO_SECRET_KEY

# ─── Production vars ───
[vars]
ENVIRONMENT = "production"
GOOGLE_REDIRECT_URI = "https://forlabs-admin.pages.dev/login/callback"

# Local dev overrides go in .dev.vars (gitignored):
#   ENVIRONMENT=development
#   GOOGLE_REDIRECT_URI=http://localhost:5173/login/callback
#   GOOGLE_CLIENT_ID=...
#   GOOGLE_CLIENT_SECRET=...
#   JWT_SECRET=...
#   etc.
